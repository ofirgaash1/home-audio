<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Host PC Audio v2</title>
    <link rel="stylesheet" href="/styles.css">
    <script type="importmap">
      {
        "imports": {
          "weq8": "/vendor/weq8-local/runtime.js",
          "weq8/ui": "/vendor/weq8-local/ui.js",
          "weq8/": "/vendor/weq8-local/",
          "lit": "/vendor/npm/lit/index.js",
          "lit/": "/vendor/npm/lit/",
          "lit-html": "/vendor/npm/lit-html/lit-html.js",
          "lit-html/": "/vendor/npm/lit-html/",
          "lit-element/": "/vendor/npm/lit-element/",
          "@lit/reactive-element": "/vendor/npm/@lit/reactive-element/reactive-element.js",
          "@lit/": "/vendor/npm/@lit/"
        }
      }
    </script>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-top">
          <div>
            <div class="eyebrow">Host</div>
            <h1>Home Audio</h1>
          </div>
          <form action="https://www.paypal.com/donate" method="post" target="_top" class="donate-form">
            <input type="hidden" name="hosted_button_id" value="MRJF9A83YR2BE">
            <input
              type="image"
              src="https://www.paypalobjects.com/en_US/IL/i/btn/btn_donateCC_LG.gif"
              border="0"
              name="submit"
              title="PayPal - The safer, easier way to pay online!"
              alt="Donate with PayPal">
          </form>
        </div>
        <div class="grid">
          <div class="card">
            <p class="small">Source</p>
            <div class="button-row" style="margin-top: 10px;">
              <select id="source-device"></select>
              <button id="refresh-devices" type="button" class="secondary">Refresh</button>
            </div>
            <p class="small" style="margin-top: 12px;">Normally: CABLE Output (VB-Audio Virtual Cable)</p>
          </div>
          <div class="card">
            <p class="small">Monitor</p>
            <div class="button-row" style="margin-top: 10px;">
              <select id="monitor-device"></select>
            </div>
            <p class="small" style="margin-top: 12px;">Delay: <span id="monitor-delay-value">0 ms</span></p>
            <input id="monitor-delay" type="range" min="0" max="300" step="5" value="0" style="width: 100%; margin-top: 10px;">
            <div class="button-row preset-row" style="margin-top: 12px;">
              <button type="button" class="secondary preset-button" data-delay="100">Phone 100</button>
              <button type="button" class="secondary preset-button" data-delay="110">XM5 110</button>
              <button type="button" class="secondary preset-button" data-delay="210">JBL 210</button>
            </div>
          </div>
        </div>
        <div class="button-row">
          <button id="start">Start</button>
          <button id="stop" class="secondary" disabled>Stop</button>
          <button id="takeover" class="secondary" type="button" disabled>Take Over</button>
          <button id="server-toggle" class="secondary" type="button">pause relay</button>
          <button id="server-shutdown" class="secondary" type="button">shutdown app</button>
        </div>
        <div class="status" id="status">Idle</div>
        <audio id="monitor-player" autoplay playsinline hidden></audio>
      </section>

      <section class="panel">
        <h2>Participants <span class="badge"><span id="listener-count">0</span></span></h2>
        <div class="table-wrap">
          <table class="participant-table">
            <tbody id="participants-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel" id="eq-drawer-shell">
        <div class="eq-inline-head">
          <div>
            <h2 id="eq-drawer-title">EQ</h2>
            <p class="small" id="eq-drawer-subtitle">Saved locally.</p>
          </div>
          <div class="drawer-actions">
            <button type="button" class="secondary" id="eq-save-preset">Save Preset</button>
            <button type="button" class="secondary" id="eq-bypass">Bypass</button>
            <button type="button" class="secondary" id="eq-reset">Reset</button>
          </div>
        </div>
        <div class="eq-preset-controls">
          <select id="eq-preset-select"></select>
        </div>
        <p class="small drawer-status" id="eq-drawer-status">Loading...</p>
        <div class="drawer-body">
          <weq8-ui id="participant-eq-ui" view="allBands"></weq8-ui>
        </div>
      </section>

      <section class="panel">
        <h2>URLs</h2>
        <div class="links" id="listen-links"></div>
      </section>

      <section class="panel">
        <h2>Host Debug</h2>
        <pre class="codebox diagnostics-box" id="diagnostics">Loading diagnostics...</pre>
      </section>

      <section class="panel">
        <h2>Phone Debug</h2>
        <pre class="codebox diagnostics-box" id="listener-diagnostics">Waiting for phone diagnostics...</pre>
      </section>
    </main>

    <script src="/simplepeer.min.js"></script>
    <script src="/common.js"></script>
    <script src="/host.js"></script>
  </body>
</html>
