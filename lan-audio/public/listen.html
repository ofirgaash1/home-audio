<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Listen on Phone v2</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow">Listener</div>
        <h1>Listen</h1>
        <div class="button-row">
          <button id="join">Join</button>
          <button id="leave" class="secondary" disabled>Leave</button>
        </div>
        <div class="status" id="status">Idle</div>
        <audio id="player" controls autoplay playsinline></audio>
      </section>

      <section class="panel">
        <h2>Participants</h2>
        <div class="table-wrap">
          <table class="participant-table">
            <tbody id="participants-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>Meters</h2>
        <div class="meter-grid">
          <div class="meter-card">
            <div class="meter-heading">
              <span>In</span>
              <span class="small" id="incoming-meter-value">Waiting for audio</span>
            </div>
            <canvas id="incoming-meter" class="meter-canvas"></canvas>
          </div>
          <div class="meter-card">
            <div class="meter-heading">
              <span>Out</span>
              <span class="small" id="playback-meter-value">Waiting for audio</span>
            </div>
            <canvas id="playback-meter" class="meter-canvas"></canvas>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Debug</h2>
        <pre class="codebox diagnostics-box" id="diagnostics">Loading diagnostics...</pre>
      </section>
    </main>

    <script src="/simplepeer.min.js"></script>
    <script src="/common.js"></script>
    <script src="/listen.js"></script>
  </body>
</html>
