<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LAN Audio Relay v2</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow">Home Audio</div>
        <h1>Open</h1>
        <div class="button-row">
          <a class="button" href="/host">Host</a>
          <a class="button secondary" href="/listen">Listen</a>
        </div>
      </section>

      <section class="panel">
        <h2>URLs</h2>
        <div class="links" id="listen-links"></div>
      </section>
    </main>

    <script src="/common.js"></script>
    <script>
      const links = document.querySelector('#listen-links')

      fetchStatus()
        .then(status => {
          if (!status.listenPages.length) {
            links.innerHTML = '<p class="small">No URLs</p>'
            return
          }

          links.innerHTML = status.listenPages
            .map(url => `<div class="codebox">${url}</div>`)
            .join('')
        })
        .catch(error => {
          links.innerHTML = '<p class="small">Unavailable</p>'
        })
    </script>
  </body>
</html>
